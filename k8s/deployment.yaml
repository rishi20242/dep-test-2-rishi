apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  progressDeadlineSeconds: 300 # Wait 5 minutes instead of failing quickly
  template:
    spec:
      containers:
      - name: sample-app
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80 # Ensure this matches your app's port
        readinessProbe:
          httpGet:
            path: / # Or whatever path returns 200 OK
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
